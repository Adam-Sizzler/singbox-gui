name: Build Windows Binary On Tag

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published
      - edited

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install mingw-w64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build windows binary
        env:
          APP_RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          chmod +x build-windows.sh
          ./build-windows.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: singbox-wrapper-windows-${{ steps.tag.outputs.value }}
          path: singbox-wrapper.exe
          if-no-files-found: error

      - name: Attach binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: singbox-wrapper.exe
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
