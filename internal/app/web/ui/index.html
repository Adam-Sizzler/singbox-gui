<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sing-box GUI</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <section class="panel settings-panel">
      <div class="panel-header">
        <h1 id="settingsTitle">Настройки</h1>
        <div class="lang-switch">
          <div id="releaseMenuWrap" class="release-menu-wrap">
            <button class="control release-menu-toggle" id="releaseMenuToggle" type="button" aria-haspopup="menu" aria-expanded="false">
              <span id="releaseUpdateBadge" class="release-update-badge" hidden></span>
              <span id="releaseMenuLabel" class="release-menu-label">Release</span>
              <span class="release-menu-arrow" aria-hidden="true"></span>
            </button>
            <div id="releaseMenu" class="release-menu" role="menu" hidden>
              <div class="release-menu-item release-menu-item-info" role="none">
                <span id="releaseCurrentCaption" class="release-menu-caption">Текущий релиз</span>
                <a id="releaseCurrentLink" class="release-menu-value release-menu-link" href="#" target="_blank" rel="noopener noreferrer" role="menuitem">-</a>
              </div>
              <div id="releaseLatestRow" class="release-menu-item release-menu-item-info" role="none">
                <span id="releaseLatestCaption" class="release-menu-caption">Последний релиз</span>
                <a id="releaseLatestLink" class="release-menu-value release-menu-link" href="#" target="_blank" rel="noopener noreferrer" role="menuitem">-</a>
              </div>
              <button id="updateAppBtn" class="release-menu-item release-menu-action" type="button" role="menuitem">Обновить приложение</button>
            </div>
          </div>
          <button class="control lang-btn" id="langRu" type="button">RU</button>
          <button class="control lang-btn" id="langEn" type="button">EN</button>
        </div>
      </div>
      <div class="field-row">
        <label class="field-label" id="labelProfile" for="profilePicker">Профиль:</label>
        <div class="field-control">
          <div class="profile-controls">
            <div class="profile-picker-wrap" id="profileWrap">
              <button class="control profile-picker" id="profilePicker" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="profileValue" class="profile-value"></span>
                <span class="profile-arrow" aria-hidden="true"></span>
              </button>
              <div id="profileMenu" class="profile-menu" role="listbox" hidden></div>
            </div>
            <div class="profile-actions">
              <button class="control" id="newProfile" type="button">Новый</button>
              <button class="control" id="deleteProfile" type="button">Удалить</button>
            </div>
          </div>
        </div>
      </div>

      <div class="field-row">
        <label class="field-label" id="labelUrl" for="url">Ссылка:</label>
        <div class="field-control">
          <input class="control" id="url" type="text" autocomplete="off">
        </div>
      </div>

      <div class="halves-row">
        <div class="half-block half-block-left">
          <div class="half-content">
            <label class="half-label" id="labelVersion" for="version">Версия ядра:</label>
            <div class="half-control">
              <input class="control" id="version" type="text" autocomplete="off">
            </div>
          </div>
        </div>
        <div class="half-block half-block-right">
          <div class="half-content">
            <label class="half-label" id="labelAutoUpdate" for="autoUpdateHours">Автообновление (часы):</label>
            <div class="half-control">
              <input class="control" id="autoUpdateHours" type="number" min="0" step="1" autocomplete="off">
            </div>
          </div>
        </div>
      </div>

      <div class="field-row">
        <label class="field-label" id="labelStartupOptions">Запуск:</label>
        <div class="field-control">
          <div class="startup-options">
            <label class="startup-option" for="autoStartCore">
              <input id="autoStartCore" type="checkbox">
              <span id="labelAutoStartCore">Автозапуск ядра при старте приложения</span>
            </label>
            <label class="startup-option" for="startMinimizedTray">
              <input id="startMinimizedTray" type="checkbox">
              <span id="labelStartMinimizedTray">Запускать приложение свернутым в трей</span>
            </label>
          </div>
        </div>
      </div>

      <div class="field-row">
        <label class="field-label" id="labelRunCheck" for="checkConfig">Запуск/проверка:</label>
        <div class="field-control">
          <div class="run-controls">
            <button class="control" id="checkConfig" type="button">Проверить</button>
            <button class="control" id="startStop" type="button">Старт</button>
            <div id="mobileActionsWrap" class="mobile-actions-wrap">
              <button class="control mobile-actions-toggle" id="mobileActionsToggle" type="button" aria-haspopup="menu" aria-expanded="false">Действия</button>
              <div id="mobileActionsMenu" class="mobile-actions-menu" role="menu" hidden>
                <button id="mobileActionCheckConfig" class="mobile-actions-item" type="button" role="menuitem">Проверить</button>
                <button id="mobileActionCopyLogs" class="mobile-actions-item" type="button" role="menuitem">Копировать логи</button>
              </div>
            </div>
            <div id="status" class="status"></div>
            <div id="uptime" class="uptime"></div>
          </div>
        </div>
      </div>

    </section>

    <section class="panel logs-panel">
      <div class="logs-header">
        <h2 id="logsTitle">Логи</h2>
        <button class="control" id="copyLogs" type="button">Копировать логи</button>
      </div>
      <div id="logs" class="control"></div>
    </section>
  </div>

  <div id="confirmModal" class="confirm-modal" hidden>
    <div id="confirmModalOverlay" class="confirm-modal-overlay"></div>
    <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
      <div class="confirm-modal-header">
        <h3 id="confirmTitle">Подтверждение</h3>
      </div>
      <div id="confirmMessage" class="confirm-modal-message"></div>
      <div class="confirm-modal-actions">
        <button class="control" id="confirmCancel" type="button">Отмена</button>
        <button class="control danger" id="confirmOk" type="button">Удалить</button>
      </div>
    </div>
  </div>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <script src="/app.js"></script>
</body>
</html>
